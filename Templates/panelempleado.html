<!DOCTYPE html>
<html>
    <head>
        <title>Principal</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='emple.css') }}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
 
    </head>
    <body>
        <div class="container mt-5">
            <div class="carta">
                <h1 class="text-center">
                    Informacion del empleado
                </h1> 
                <div class="text-center">
                    <a href="{{url_for('salir')}}" class="boton">
                        Cerrar sesion
                    </a> 
                </div>
            </div>
            <table class="table table-dark table-striped mt-3">
                <thead class="table-dark">
                    <tr>
                        <td>Nombre</td>
                        <td>Apellido</td>
                        <td>Cargo</td>
                        <td>Horas extras</td>
                        <td>Bonificacion</td>
                        <td>Salario bruto</td>
                        <td>Departamento</td>
                        <td>Oopciones</td>
                    </tr>
                </thead>
                <tbody>
                    {%for u in emplea%}
                    <tr>
                        <td>{{ u[2]}}</td>
                        <td>{{ u[3]}}</td>
                        <td>{{ u[4]}}</td>
                        <td>{{ u[6]}}</td>
                        <td>{{ u[7]}}</td>
                        <td>{{ u[5]}}</td>
                        <td>{{ u[12] }}</td>
                        <td>
                            <a href="{{url_for('editarempleado', id=u[0])}}" class="btn btn-outline-light p-2 me-3">Editar</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </body>
</html>
