<!DOCTYPE html>
<html>
    <head>
        <title>Editar Usuario</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
 
    </head>
    <body>
        <div class="container mt-5" bg-dark text-white text-center>
            <h4 >Editar usuarios</h4>
        </div>
        <div>
            <form method="POST" action="{{ url_for('actualizarusu') }}">
                <input type="hidden" name="id_usuario" value="{{ usu[0] }}">
                <div class="mb-3 mt-3">
                    <label>Usuario</label>
                    <input type="text" class="form-control" name="txtusuario" placeholder="Ingresar usuario" value="{{usu[1]}}">
                </div>
                <div class="mb-3">
                    <label>Contraseña</label>
                    <input type="text" class="form-control" name="txtcontrasena" placeholder="Ingresar contraseña" value="{{usu[2]}}">
                </div>
                <div class="mb-3">
                    <label>Rol:</label>
                    <select class="form-select" name="txtrol" required value="{{usu[3]}}">
                        <option value="">Seleccione el rol</option>
                        <option value="admin">Administrador</option>
                        <option value="empleado">Empleado</option>
                    </select>
                </div>
                <div class="mb-3 mt-3">
                    <label>Documento</label>
                    <input type="number" class="form-control" name="txtdocumento" placeholder="Ingresar documento" value="{{usu[4]}}">
                </div>
                <button type="submit" class="btn btn-dark">Actualizar</a></button>
                <a href="{{ url_for('inicioadmin') }}" class="btn btn-dark">Cancelar</a>
            </form>
        </div>
    </body>
</html>
