<!DOCTYPE html>
<html>
    <head>
        <title>Editar Empleado</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
 
    </head>
    <body>
        <div>
            <h4 class="modal-title">Actualizar Empleado</h4>
        </div>
        <div>
            <form method="POST" action="{{url_for('actualizarempleado')}}">
                <input type="hidden" name="id" value="{{ emp[0] }}">
                <div class="mb-3">
                    <label>Ingresar nombre del empleado</label>
                    <input type="text" class="form-control" name="nombre" placeholder="Ingresar nombre" value="{{ emp[2] }}">
                </div>
                <div class="mb-3">
                    <label>Ingresar apellido del empleado</label>
                    <input type="text" class="form-control" name="apellido" placeholder="Ingresar apellido" value="{{ emp[3] }}">
                </div>
                <div class="mb-3 mt-3">
                    <label>Cargo</label>
                    <select class="form-select" name="cargo" required value="{{ emp[4] }}">
                        <option value="">Seleccione el cargo</option>
                        <option value="gerente">gerente</option>
                        <option value="administrador">administrador</option>
                        <option value="contador">contador</option>
                    </select>
                </div>
                <div class="mb-3 mt-3">
                    <label>Ingresar el nombre del departamento</label>
                    <select class="form-select" name="departamento" required value="{{ emp[12] }}">
                        <option value="">Seleccione el departamento</option>
                        <option value="Recursos humanos">Recursos humanos</option>
                        <option value="Sistemas">Sistemas</option>
                        <option value="Administracion">Administracion</option>
                        <option value="Contabilidad">Contabilidad</option>
                        <option value="Cafeteria">Cafeteria</option>
                        <option value="Parqueaderos">Parqueaderos</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-dark">Actualizar</a></button>
                <a href="{{ url_for('inicioemple') }}" class="btn btn-dark">Cancelar</a>
            </form>
        </div>
    </body>
</html>
