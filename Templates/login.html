<!DOCTYPE html>
<html>
    <head>
        <title>Inicio de sesion</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
 
    </head>
    <body>
        <div class="container mt-5" bg-dark text-white text-center>
            <h4 >Ingresar</h4>
        </div>
        <div class="body">
            <form method="POST" action="{{ url_for("login_form")}}">
                <div class="mb-3 mt-3">
                    <label>Ingresar usuario</label>
                    <input type="text" class="form-control" name="txtusuario" placeholder="Ingresar usuario">
                </div>
                <div class="mb-3">
                    <label>Ingresar contraseña</label>
                    <input type="password" class="form-control" name="txtcontrasena" placeholder="Ingresar contraseña">
                </div>
                <div class="mb-3 mt-3">
                    <button type="submit" class="btn btn-dark">Ingresar</button>
                    <button type="submit" class="btn btn-dark">Recordar contraseña</button>
                </div>
            </form>
        </div>
    </body>
</html>
