<!DOCTYPE html>
<html>
    <head>
        <title>Principal</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
 
    </head>
    <body>
        <div class="modal" id="myModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">Registro de usuarios</h4>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form method="POST" action="{{url_for('guardar_usuario')}}">
                            <div class="mb-3 mt-3">
                                <label>Ingresar nombre de usuario</label>
                                <input type="text" class="form-control" name="txtusuario" placeholder="Ingresar usuario">
                            </div>
                            <div class="mb-3">
                                <label>Ingresar contraseña</label>
                                <input type="password" class="form-control" name="txtcontrasena" placeholder="Ingresar contraseña">
                            </div>
                            <div class="mb-3">
                                <label>Rol:</label>
                                <select class="form-select" name="txtrol" required>
                                    <option value="">Seleccione el rol</option>
                                    <option value="admin">Administrador</option>
                                    <option value="empleado">Empleado</option>
                                </select>
                            </div>
                            <div class="mb-3 mt-3">
                                <label>Ingresar documento</label>
                                <input type="number" class="form-control" name="txtdocumento" placeholder="Ingresar documento">
                                <button type="submit" class="btn btn-danger" data-bs-dismiss="modal">Registrar</a></button>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-danger" data-bs-dismiss="modal"><a href="">Registrar</a></button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
