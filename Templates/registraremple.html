<!DOCTYPE html>
<html>
    <head>
        <title>Registro de Empleados</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='registros.css') }}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
 
    </head>
    <body>
        <div class="modal" id="myModal2">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">Registro de empleados</h4>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form method="POST" action="{{url_for('registrar_empleado')}}">
                            
                            <div class="mb-3 mt-3">
                                <label>Ingresar documento del empleado</label>
                                <input type="number" class="form-control" name="documento" placeholder="Ingresar documento">
                            </div>
                            <div class="mb-3">
                                <label>Ingresar nombre del empleado</label>
                                <input type="text" class="form-control" name="nombre" placeholder="Ingresar nombre">
                            </div>
                            <div class="mb-3">
                                <label>Ingresar apellido del empleado</label>
                                <input type="text" class="form-control" name="apellido" placeholder="Ingresar apellido">
                            </div>
                            <div class="mb-3 mt-3">
                                <label>Cargo</label>
                                <select class="form-select" name="cargo" required>
                                    <option value="">Seleccione el cargo</option>
                                    <option value="gerente">gerente</option>
                                    <option value="administrador">administrador</option>
                                    <option value="contador">contador</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label>Ingresar horas extra</label>
                                <input type="number" class="form-control" name="hextra" placeholder="Ingresar horas extra">
                            </div>
                            <div class="mb-3">
                                <label>Ingresar bonificacion</label>
                                <input type="number" class="form-control" name="bonificacion" placeholder="Ingresar bonificacion">
                            </div>
                            <div class="mb-3 mt-3">
                                <label>Departamento</label>
                                <select class="form-select" name="departamento" required>
                                    <option value="">Seleccione el departamento</option>
                                    <option value="Recursos humanos">Recursos humanos</option>
                                    <option value="Sistemas">Sistemas</option>
                                    <option value="Administracion">Administracion</option>
                                    <option value="Contabilidad">Contabilidad</option>
                                    <option value="Cafeteria">Cafeteria</option>
                                    <option value="Parqueaderos">Parqueaderos</option>
                                </select>
                                <button type="submit" class="bot" data-bs-dismiss="modal">Registrar</a></button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
