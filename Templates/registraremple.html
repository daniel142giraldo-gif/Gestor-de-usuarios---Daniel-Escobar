<!DOCTYPE html>
<html>
    <head>
        <title>Principal</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
 
    </head>
    <body>
        <div class="modal" id="myModal2">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">Registro de empleados</h4>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form method="POST" action="{{url_for('registrar_empleado')}}">
                            
                            <div class="mb-3 mt-3">
                                <label>Ingresar documento del empleado</label>
                                <input type="number" class="form-control" name="documento" placeholder="Ingresar documento">
                            </div>
                            <div class="mb-3">
                                <label>Ingresar nombre del empleado</label>
                                <input type="text" class="form-control" name="nombre" placeholder="Ingresar nombre">
                            </div>
                            <div class="mb-3">
                                <label>Ingresar apellido del empleado</label>
                                <input type="text" class="form-control" name="apellido" placeholder="Ingresar apellido">
                            </div>
                            <div class="mb-3 mt-3">
                                <label>Ingresar cargo del empleado</label>
                                <input type="text" class="form-control" name="cargo" placeholder="Ingresar cargo">
                            </div>
                            <div class="mb-3">
                                <label>Ingresar horas extra</label>
                                <input type="number" class="form-control" name="hextra" placeholder="Ingresar horas extra">
                            </div>
                            <div class="mb-3">
                                <label>Ingresar bonificacion</label>
                                <input type="number" class="form-control" name="bonificacion" placeholder="Ingresar bonificacion">
                            </div>
                            <div class="mb-3 mt-3">
                                <label>Ingresar el nombre del departamento</label>
                                <input type="text" class="form-control" name="departamento" placeholder="Ingresar nombre del departamento">
                                <button type="submit" class="btn btn-danger" data-bs-dismiss="modal">Registrar</a></button>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-danger" data-bs-dismiss="modal"><a href="">Registrar</a></button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
