<!DOCTYPE html>
<html>
    <head>
        <title>Editar Empleado</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='editores.css') }}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
 
    </head>
    <body>
        <div>
            <h4 class="container">Editar Empleado</h4>
        </div>
        <div class="caja2">
            <form method="POST" action="{{url_for('actualizaremple')}}">
                <input type="hidden" name="id" value="{{ emp[0] }}">
                <div class="mb-3 mt-3">
                    <label>Ingresar documento del empleado</label>
                    <input type="number" class="form-control" name="documento" placeholder="Ingresar documento" value="{{ emp[1] }}">
                </div>
                <div class="mb-3">
                    <label>Ingresar nombre del empleado</label>
                    <input type="text" class="form-control" name="nombre" placeholder="Ingresar nombre" value="{{ emp[2] }}">
                </div>
                <div class="mb-3">
                    <label>Ingresar apellido del empleado</label>
                    <input type="text" class="form-control" name="apellido" placeholder="Ingresar apellido" value="{{ emp[3] }}">
                </div>
                <div class="mb-3 mt-3">
                    <label>Cargo</label>
                    <select class="form-select" name="cargo" required value="{{ emp[4] }}">
                        <option value="">Seleccione el cargo</option>
                        <option value="gerente">gerente</option>
                        <option value="administrador">administrador</option>
                        <option value="contador">contador</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Ingresar horas extra</label>
                    <input type="number" class="form-control" name="hextra" placeholder="Ingresar horas extra" value="{{ emp[5] }}">
                </div>
                <div class="mb-3">
                    <label>Ingresar bonificacion</label>
                    <input type="number" class="form-control" name="bonificacion" placeholder="Ingresar bonificacion" value="{{ emp[6] }}">
                </div>
                <div class="mb-3 mt-3">
                    <label>Ingresar el nombre del departamento</label>
                    <input type="text" class="form-control" name="departamento" placeholder="Ingresar nombre del departamento" value="{{ emp[10] }}">
                </div>
                <button type="submit" class="botons">Actualizar</a></button>
                <a href="{{ url_for('inicioadmin') }}" class="botons1">Cancelar</a>
            </form>
        </div>
    </body>
</html>
